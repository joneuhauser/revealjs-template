          <pre class="code-slide"><code class="language-cpp">int main (void)
{
  std::vector&lt;bool&gt; is_prime (100, true);
  for (int i = 2; i &lt; 100; i++)
  {
    if (is_prime[i])
    {
      std::cout &lt;&lt; i &lt;&lt; " ";
      for (int j = i; j &lt; 100; is_prime [j] = false, j+=i);
    }
  }
  return 0;
}</code></pre>
