image: node:22

stages:
  - deploy

pages:
  stage: deploy
  needs: []
  pages: true
  before_script:
    - npm ci
  script:
    - mkdir -p public/vendor
    - cp -R index.html src template public/
    - cp -R vendor/reveal-runtime public/vendor/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
